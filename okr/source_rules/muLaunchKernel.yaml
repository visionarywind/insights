api: muLaunchKernel
phase: M1
runtime_api: musaLaunchKernel
entry:
  runtime: MUSA-Runtime/src/musa_wrappers_generated.cpp
  driver: linux-ddk/musa/src/driver/mu_module.cpp
core_path:
  - linux-ddk/musa/src/musa/core/stream.cpp: Stream::CmdLaunchKernel
  - linux-ddk/musa/src/musa/core/context.cpp: Context::ResolveDependencyAndQueueCommand
  - linux-ddk/musa/src/musa/core/stream.cpp: Stream::QueueCommand
  - linux-ddk/musa/src/musa/core/stream.cpp: Stream::AsyncSubmit
  - linux-ddk/musa/src/musa/core/command/dispatchCommand.cpp: DispatchCommand::Build
  - linux-ddk/musa/src/musa/core/command/command.cpp: Command::SubmitToQueue
  - linux-ddk/musa/src/hal/m3d: M3D/HAL submit
state_variables:
  - context_id
  - stream_id
  - function/module handle
  - command_id
  - dependency_count
  - queue_depth
  - submission_id
model_events:
  - RUNTIME_API_SPAN
  - DRIVER_API_SPAN
  - COMMAND_CREATE
  - DEPENDENCY_RESOLVE_SPAN
  - STREAM_QUEUE_COMMAND_SPAN
  - COMMAND_BUILD_SPAN
  - COMMAND_MERGE_DECISION
  - COMMAND_SUBMIT_SPAN
  - SUBMISSION_RELATION
  - KERNEL_ACTIVITY_RELATION
cost_terms:
  - runtime_us
  - driver_us
  - function_lookup_us
  - dependency_us
  - queue_us
  - build_us
  - merge_us
  - submit_us
  - unknown_us
validation:
  benchmark: musaSetDevice -> musaMalloc -> musaLaunchKernel -> musaStreamSynchronize -> musaFree
  relation_recall: ">=0.95"
  unknown_ratio: "<=0.15"
